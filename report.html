<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Report Scam</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2>Report a Scam</h2>

<input id="name" placeholder="Your Name"><br><br>
<input id="contact" placeholder="Email or Phone"><br><br>
<textarea id="desc" placeholder="Describe scam..." rows="5"></textarea><br><br>

<button onclick="submitReport()">Submit Report</button>

<p id="feedback"></p>

<script>
async function submitReport() {

    const name = document.getElementById("name").value.trim();
    const contact = document.getElementById("contact").value.trim();
    const desc = document.getElementById("desc").value.trim();

    if (!name || !contact || !desc) {
        alert("Fill all fields");
        return;
    }

    try {
        const response = await fetch('/api/reports', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                name: name,
                contact: contact,
                description: desc
            })
        });

        const data = await response.json();

        if (data.status === "success") {
            document.getElementById("feedback").innerText = "✅ Saved successfully";

            // clear form
            document.getElementById("name").value = "";
            document.getElementById("contact").value = "";
            document.getElementById("desc").value = "";
        } else {
            document.getElementById("feedback").innerText = "❌ Failed";
        }

    } catch (error) {
        console.error(error);
        document.getElementById("feedback").innerText = "⚠ Connection error";
    }
}
</script>

</body>
</html>
